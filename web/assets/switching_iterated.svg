<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, Segoe UI, system-ui, sans-serif">
<rect width="900" height="500" fill="#0A0502"/>
<text x="70" y="40" fill="#FF8012" font-size="13" font-family="ui-monospace, Consolas, monospace" letter-spacing="2">&gt; SWITCHING ITERATO // profondità d, livello dopo livello</text>
<text x="70" y="68" fill="#FCF2E6" font-size="22" font-weight="700">L'AC0 si appiattisce round dopo round — la parità no</text>
<line x1="70" y1="436" x2="870" y2="436" stroke="#876244"/>
<line x1="70" y1="100" x2="70" y2="436" stroke="#876244"/>
<line x1="70" y1="100" x2="870" y2="100" stroke="#876244" stroke-dasharray="3 5" opacity="0.5"/>
<text x="62" y="104" fill="#876244" font-size="11" text-anchor="end">1.0</text>
<text x="62" y="440" fill="#876244" font-size="11" text-anchor="end">0.0</text>
<polyline points="70,100 870,100" fill="none" stroke="#D73434" stroke-width="3"/>
<circle cx="70" cy="100" r="4" fill="#D73434"/>
<circle cx="870" cy="100" r="4" fill="#D73434"/>
<polyline points="70,414 870,423" fill="none" stroke="#4AF626" stroke-width="3"/>
<circle cx="70" cy="414" r="4" fill="#4AF626"/>
<circle cx="870" cy="423" r="4" fill="#4AF626"/>
<text x="70" y="458" fill="#876244" font-size="12" text-anchor="middle">1</text>
<text x="870" y="458" fill="#876244" font-size="12" text-anchor="middle">2</text>
<text x="470" y="480" fill="#876244" font-size="12" text-anchor="middle">round di restrizione (un livello consumato per round)</text>
<text x="20" y="268" fill="#876244" font-size="12" text-anchor="middle" transform="rotate(-90 20 268)">variabili da leggere / variabili libere (D ÷ #liberi)</text>
<rect x="670" y="100" width="12" height="12" fill="#D73434"/>
<text x="688" y="111" fill="#FCF2E6" font-size="13">parità (= 1.0, le legge tutte)</text>
<rect x="670" y="122" width="12" height="12" fill="#4AF626"/>
<text x="688" y="133" fill="#FCF2E6" font-size="13">AC0 (→ 0, collassa)</text>
</svg>