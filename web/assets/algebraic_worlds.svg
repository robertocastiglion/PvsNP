<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, Segoe UI, system-ui, sans-serif">
<rect width="900" height="480" fill="#0A0502"/>
<text x="60" y="40" fill="#FF8012" font-size="13" font-family="ui-monospace, Consolas, monospace" letter-spacing="2">&gt; ALGEBRAIC WORLDS // potenza e limite dell'accesso algebrico</text>
<text x="60" y="68" fill="#FCF2E6" font-size="22" font-weight="700">Una query algebrica vale 2^m booleane — ma servono 2^m per l'oracolo</text>
<text x="60" y="86" fill="#876244" font-size="12">query per rilevare il bit piantato</text>
<line x1="60" y1="420" x2="420" y2="420" stroke="#876244"/>
<rect x="120" y="96" width="80" height="324" fill="#D73434" opacity="0.9"/>
<text x="160" y="88" fill="#FCF2E6" font-size="13" font-weight="600" text-anchor="middle">16</text>
<text x="160" y="440" fill="#876244" font-size="12" text-anchor="middle">booleano</text>
<rect x="280" y="341" width="80" height="79" fill="#4AF626" opacity="0.9"/>
<text x="320" y="333" fill="#FCF2E6" font-size="13" font-weight="600" text-anchor="middle">1</text>
<text x="320" y="440" fill="#876244" font-size="12" text-anchor="middle">algebrico</text>
<text x="500" y="86" fill="#876244" font-size="12">rango del sistema vs 2^m (soglia di determinazione)</text>
<line x1="500" y1="420" x2="860" y2="420" stroke="#876244"/>
<rect x="512" y="400" width="36" height="20" fill="#FF8012" opacity="0.9"/>
<text x="530" y="440" fill="#876244" font-size="11" text-anchor="middle">1</text>
<rect x="572" y="339" width="36" height="81" fill="#FF8012" opacity="0.9"/>
<text x="590" y="440" fill="#876244" font-size="11" text-anchor="middle">4</text>
<rect x="632" y="258" width="36" height="162" fill="#FF8012" opacity="0.9"/>
<text x="650" y="440" fill="#876244" font-size="11" text-anchor="middle">8</text>
<rect x="692" y="177" width="36" height="243" fill="#FF8012" opacity="0.9"/>
<text x="710" y="440" fill="#876244" font-size="11" text-anchor="middle">12</text>
<rect x="752" y="116" width="36" height="304" fill="#FF8012" opacity="0.9"/>
<text x="770" y="440" fill="#876244" font-size="11" text-anchor="middle">15</text>
<rect x="812" y="96" width="36" height="324" fill="#4AF626" opacity="0.9"/>
<text x="830" y="440" fill="#876244" font-size="11" text-anchor="middle">16</text>
<line x1="500" y1="96" x2="860" y2="96" stroke="#D73434" stroke-dasharray="6 4"/>
<text x="860" y="90" fill="#D73434" font-size="11" text-anchor="end">2^m = 16 (determinato)</text>
<text x="680" y="460" fill="#876244" font-size="12" text-anchor="middle">numero di query algebriche</text>
</svg>