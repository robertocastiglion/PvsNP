[pytest]
# Strategia anti-blocco della suite (research loop):
#  - i test ESAUSTIVI/lenti sono marcati `slow` e DESELEZIONATI di default,
#    cosi` `py -m pytest` resta veloce; eseguili con  `py -m pytest -m slow`.
#  - `--timeout` e` un interruttore automatico: qualunque test (non-slow) che
#    superi la soglia viene interrotto invece di bloccare l'intera sessione.
#    Su Windows il metodo e` `thread`. I test `slow` alzano la soglia con il
#    decoratore @pytest.mark.timeout(...) sul singolo test.
addopts = -q --timeout=120 --timeout-method=thread -m "not slow"
markers =
    slow: test esaustivo/lento, deselezionato di default (esegui con: py -m pytest -m slow)
